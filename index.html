<!doctype html>
<html lang="en">
<!-- This head is essentially a preamble. Stylesheets, fonts and the like are here -->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- This is the title shown in the tab-header in the browser -->
<title>Amalie Stokholm | Galactic archaeology | TASC 2026</title>

<link rel="stylesheet" href="./dist/reset.css">
<link rel="stylesheet" href="./dist/reveal.css">
<link rel="stylesheet" href="./dist/theme/lestat.css">

<!-- This is for a generic Google font and can be changed -->
<!-- Go to fonts.google.com and find your font. Then click 'Get font', 'Get embed code', and copy the lines for html -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- Theme used for syntax highlighted code -->
<link rel="stylesheet" href="plugin/highlight/monokai.css">
<script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
<style>
:root {
	/* https://github.com/hakimel/reveal.js/blob/master/css/theme/template/exposer.scss */
	--r-main-font: "Raleway", sans-serif;
	--r-heading-font: "Raleway", sans-serif;
	--r-main-font-weight: 300;
	--r-heading-font-weight: 600;
	--r-main-font-size: 35px;
}

.reveal {
	/* Needed because reveal.js doesn't officially have --r-main-font-weight */
	font-weight: var(--r-main-font-weight);
}
.reveal ul li::marker {
  color: #ff79c6;
}

.reveal ol li::marker {
  color: #ff79c6;
}
/* Timeline stuff */
.horizontal-timeline {
  position: relative;
  width: 80%;
  margin: 60px auto 20px;
  height: 80px;
}
.timeline-line-horizontal {
  position: absolute;
  top: 40px;
  left: 0;
  width: calc(100% - 20px);
  height: 4px;
  background: linear-gradient(to right, #bd93f9, #ff79c6);
  border-radius: 2px;
}
.timeline-arrow-horizontal {
  position: absolute;
  top: 40px;
  right: 0;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 20px solid #ff79c6;
}
.timeline-dot {
  position: absolute;
  top: 40px;
  transform: translate(-50%, -50%);
  width: 18px;
  height: 18px;
  border: 3px solid #282a36;
  border-radius: 50%;
  z-index: 10;
}
/* Dynamic gradient colors using color-mix based on position */
/* The color interpolates from purple (#bd93f9) to pink (#ff79c6) based on left percentage */
.timeline-dot[style*="left:0%"] {
  background: color-mix(in srgb,#bd93f9 100%,#ff79c6 0%);
}

.timeline-dot[style*="left:23.1%"] {
  background: color-mix(in srgb,#bd93f9 77%,#ff79c6 23%);
}

.timeline-dot[style*="left:38.5%"] {
  background: color-mix(in srgb,#bd93f9 62%,#ff79c6 38%);
}

.timeline-dot[style*="left:53.8%"] {
  background: color-mix(in srgb,#bd93f9 46%,#ff79c6 54%);
}

.timeline-dot[style*="left:76.9%"] {
  background: color-mix(in srgb,#bd93f9 23%,#ff79c6 77%);
}

.timeline-dot[style*="left:92.3%"] {
  background: color-mix(in srgb,#bd93f9 8%,#ff79c6 92%);
}

.timeline-dot[style*="left:100%"] {
  background:#ff79c6;
}
.timeline-year {
  position: absolute;
  top: 60px;
  transform: translateX(-50%);
  font-size: 0.7em;
  color: #6272a4;
  font-weight: 300;
}
.reveal .slides section.small-text {
  font-size: 0.75em;
}
.small-text {
  font-size: 0.75em;
}
.small-text table {
  transform: scale(0.7);
  transform-origin: top left;
}
.outline-item {
  position: relative;
  display: inline-block;
}
.strike {
  width: 0;
  transition: width 0.8s ease;
}
.fragment.visible.strike {
  width: 100%;
}
.reveal .footrefs {
    position: absolute;
    left: 0.8em;
    right: 0.8em;
    bottom: 0.5em;
    font-size: 0.5em;
    line-height: 1.05;
    text-align: left;
}
.reveal .footrefs .prefix {
    color: #6272a4;
}

.reveal .footrefs .paper-ref {
    color: #6272a4;
    text-decoration: none;
    font-size: inherit;
}

.reveal .footrefs .paper-ref:hover {
    text-decoration: underline;
}
.reveal .paper-ref.highlight {
    color: #6272a4;
    font-weight: 700;
}

.launch-list {
  list-style: none;
  padding-left: 0;
  line-height: 1.8;
}

.launch-list li::before {
  display: inline-block;
  width: 4em;
  font-weight: bold;
  color: #4da6ff;   /* choose your preferred colour */
}
.launch-list li.y2026::before { content: "2026"; }
.launch-list li.y2027::before { content: "2027"; }
.launch-list li.y2028::before { content: "2028"; }
.launch-list li.y2030::before { content: "2030"; }
.launch-list li.y2035::before { content: "2035"; }

</style>

</head>

<!-- This is the main set-up of the slides -->
<body>
<div class="reveal">
	<div class="slides">
		<section data-markdown="./slides/intro.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
		<section data-markdown="./slides/keydiscoveries.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
		<section data-markdown="./slides/nearfuture.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
		<section data-markdown="./slides/outtro.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
	</div>
</div>

<!-- This below here are stuff like plugins or initialisation set-ups -->
<script src="dist/reveal.js"></script>
<script src="plugin/notes/notes.js"></script>
<script src="plugin/markdown/markdown.js"></script>
<script src="plugin/highlight/highlight.js"></script>
<script src="plugin/math/math.js"></script>
<script src="plugin/smallcontrol/smallcontrol.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealMath ]
  });

  function pinSlides() {
    const allSlides = document.querySelectorAll('.reveal .slides > section');
    allSlides.forEach((slide, index) => {
      if (index !== 0) {
        slide.style.setProperty('top', '0px', 'important');
      } else {
        slide.style.removeProperty('top');
      }
    });
  }

  Reveal.on('ready', pinSlides);
  Reveal.on('slidechanged', pinSlides);
</script>

</body>
</html>
