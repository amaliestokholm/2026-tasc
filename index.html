<!doctype html>
<html lang="en">
<!-- This head is essentially a preamble. Stylesheets, fonts and the like are here -->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- This is the title shown in the tab-header in the browser -->
<title>Amalie Stokholm | Galactic archaeology | TASC 2026</title>

<link rel="stylesheet" href="./dist/reset.css">
<link rel="stylesheet" href="./dist/reveal.css">
<link rel="stylesheet" href="./dist/theme/lestat.css">

<!-- This is for a generic Google font and can be changed -->
<!-- Go to fonts.google.com and find your font. Then click 'Get font', 'Get embed code', and copy the lines for html -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- Theme used for syntax highlighted code -->
<link rel="stylesheet" href="plugin/highlight/monokai.css">
<style>
:root {
	/* https://github.com/hakimel/reveal.js/blob/master/css/theme/template/exposer.scss */
	--r-main-font: "Raleway", sans-serif;
	--r-heading-font: "Raleway", sans-serif;
	--r-main-font-weight: 300;
	--r-heading-font-weight: 600;
	--r-main-font-size: 35px;
}

.reveal {
	/* Needed because reveal.js doesn't officially have --r-main-font-weight */
	font-weight: var(--r-main-font-weight);
}
.reveal ul li::marker {
  color: #ff79c6;
}

.reveal ol li::marker {
  color: #ff79c6;
}
/* Timeline stuff */
.horizontal-timeline {
  position: relative;
  width: 80%;
  margin: 250px auto 20px; /* extra room above the line for picture/label callouts */
  height: 80px;
}
.timeline-line-horizontal {
  position: absolute;
  top: 40px;
  left: 0;
  width: calc(100% - 20px);
  height: 4px;
  background: linear-gradient(to right, #bd93f9, #ff79c6);
  border-radius: 2px;
}
.timeline-arrow-horizontal {
  position: absolute;
  top: 45px;
  right: 0;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 20px solid #ff79c6;
}
.timeline-dot {
  position: absolute;
  top: 40px;
  transform: translate(-50%, -50%);
  width: 18px;
  height: 18px;
  border: 3px solid #282a36;
  border-radius: 50%;
  z-index: 10;
}
/* Dynamic gradient colors using color-mix based on position */
/* The color interpolates from purple (#bd93f9) to pink (#ff79c6) based on left percentage */
/* Picture callouts: top edge sits at -150px, line sits at 40px (in .horizontal-timeline
   coordinates) so the box height is fixed at 190px and a flex connector stretches to
   fill whatever space the image+label don't use, so it always reaches the line exactly. */
.timeline-callout {
  position: absolute;
  top: -190px;
  height: 230px;
  transform: translateX(-50%);
  width: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.timeline-callout img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid #ff79c6;
  box-shadow: 0 4px 14px rgba(0,0,0,0.45);
  display: block;
  flex-shrink: 0;
}
.timeline-callout .callout-label {
  font-size: 0.42em;
  color: #f8f8f2;
  margin-top: 8px;
  line-height: 1.25;
  flex-shrink: 0;
}
.timeline-callout-connector {
  position: relative;
  width: 3px;
  flex: 1 1 auto;
  min-height: 14px;
  margin-top: 6px;
  background: #ff79c6;
  opacity: 1;
}
.timeline-callout-connector::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 9px solid #ff79c6;
}

.timeline-year {
  position: absolute;
  top: 60px;
  transform: translateX(-50%);
  font-size: 0.7em;
  color: #6272a4;
  font-weight: 300;
}

/* Label-only markers: top edge at -70px, same 40px line, so fixed height 110px. */
.timeline-label-arrow {
  position: absolute;
  top: -30px;
  height: 70px;
  transform: translateX(-50%);
  width: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.timeline-label-arrow .callout-label {
  font-size: 0.4em;
  color: #f8f8f2;
  flex-shrink: 0;
}
.timeline-label-arrow-connector {
  position: relative;
  width: 3px;
  flex: 1 1 auto;
  min-height: 10px;
  margin-top: 6px;
  background: #bd93f9;
  opacity: 1;
}
.timeline-label-arrow-connector::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 9px solid #bd93f9;
}
.reveal .slides section.small-text {
  font-size: 0.77em;
}
.small-text {
  font-size: 0.77em;
}
.small-text table {
  transform: scale(0.7);
  transform-origin: top left;
}
.outline-item {
  position: relative;
  display: inline-block;
}
.strike {
  width: 0;
  transition: width 0.8s ease;
}
.fragment.visible.strike {
  width: 100%;
}
.reveal .footrefs {
    display: block;
    margin-top: auto;
    font-size: 0.5em;
    line-height: 1.05;
    text-align: right;
    padding: 0 0.8em 3em 0.8em;
}
.reveal .footrefs .prefix {
    color: #6272a4;
}

.reveal .footrefs .poster-ref {
    color: #e86fb4;
    text-decoration: none;
    font-size: inherit;
    font-weight: 400;
}
.reveal .footrefs .paper-ref {
    color: #6272a4;
    text-decoration: none;
    font-size: inherit;
}

.reveal .footrefs .paper-ref:hover {
    text-decoration: underline;
}
.reveal .paper-ref.highlight {
    color: #6272a4;
    font-weight: 700;
}

.reveal .slides section img {
    max-height: 58vh;
    object-fit: contain;
}

.reveal .slide-note {
    font-size: 0.77em;
    color: #d8d8d8;
    line-height: 1.15;
    margin: 0.2em auto 0.2em auto;
    max-width: 80%;
}

</style>

</head>

<!-- This is the main set-up of the slides -->
<body>
<div class="reveal">
	<div class="slides">
		<section data-markdown="./slides/intro.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
		<section data-markdown="./slides/keydiscoveries.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
		<section data-markdown="./slides/nearfuture.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
		<section data-markdown="./slides/outtro.md"
		     data-separator="^\n---\n$"
		     data-separator-vertical="^\n------\n$"
		     data-separator-notes="^Note:"
		     data-transition="slide">
		</section>
	</div>
</div>

<!-- This below here are stuff like plugins or initialisation set-ups -->
<script src="dist/reveal.js"></script>
<script src="plugin/notes/notes.js"></script>
<script src="plugin/markdown/markdown.js"></script>
<script src="plugin/highlight/highlight.js"></script>
<script src="plugin/math/math.js"></script>
<script src="plugin/smallcontrol/smallcontrol.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealMath ]
  });

  function pinSlides() {
    const allSlides = document.querySelectorAll('.reveal .slides > section');
    allSlides.forEach((slide, index) => {
      if (index !== 0) {
        slide.style.setProperty('top', '0px', 'important');
      } else {
        slide.style.removeProperty('top');
      }
    });
  }

  Reveal.on('ready', pinSlides);
  Reveal.on('slidechanged', pinSlides);
</script>

</body>
</html>
